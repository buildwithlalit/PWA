<div class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden w-full max-w-4xl grid grid-cols-1 md:grid-cols-2">

        <!-- Left Image Section -->
        <div class="hidden md:block">
            <img src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b" alt="Login illustration"
                class="h-full w-full object-cover" />
        </div>

        <!-- Right Login Section -->
        <div class="p-8 md:p-12 flex flex-col justify-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">
                Welcome Back 👋
            </h2>
            <p class="text-gray-500 mb-8">
                Sign in to continue
            </p>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Email
                </label>
                <input type="email" placeholder="you@example.com"
                    class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Password
                </label>
                <input type="password" placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <!-- Login Button -->
            <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Login
            </button>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <hr class="flex-grow border-gray-300" />
                <span class="mx-3 text-gray-400 text-sm">OR</span>
                <hr class="flex-grow border-gray-300" />
            </div>

            <!-- Google Login -->
            <button (click)="login()"
                class="w-full flex items-center justify-center gap-3 border py-3 rounded-lg hover:bg-gray-50 transition">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5" />
                <span class="font-medium text-gray-700">
                    Continue with Google
                </span>
            </button>

            <!-- Footer -->
            <p class="text-sm text-gray-500 mt-6 text-center">
                Don’t have an account?
                <a href="#" class="text-blue-600 font-medium hover:underline">
                    Sign up
                </a>
            </p>
        </div>
    </div>
</div>
